<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아빠 어디가</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #FF6B35; --primary-dark: #E55A25;
      --bg: #FFF8F2; --text: #2D2D2D; --sub: #888;
      --border: #FFE0CC; --shadow: 0 2px 12px rgba(255,107,53,0.1);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* AUTH */
    #auth-overlay { position: fixed; inset: 0; background: linear-gradient(135deg,#FF6B35,#FF9A5A 60%,#FFB347); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .auth-box { background: white; border-radius: 24px; padding: 32px 28px; width: 90%; max-width: 380px; box-shadow: 0 24px 60px rgba(0,0,0,0.2); }
    .auth-logo { text-align: center; margin-bottom: 24px; }
    .auth-logo h1 { font-size: 28px; color: var(--primary); font-weight: 800; }
    .auth-logo p { color: var(--sub); font-size: 14px; margin-top: 4px; }
    .auth-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .auth-tab { flex: 1; padding: 10px; border: 2px solid var(--border); border-radius: 10px; background: white; cursor: pointer; font-weight: 600; color: var(--sub); font-size: 14px; }
    .auth-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
    .auth-form { display: flex; flex-direction: column; gap: 10px; }
    .fi { width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; transition: border 0.2s; background: white; }
    .fi:focus { border-color: var(--primary); }
    .btn-primary { width: 100%; padding: 13px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 2px; }
    .btn-primary:hover { background: var(--primary-dark); }
    .auth-links { display: flex; justify-content: center; gap: 14px; margin-top: 12px; }
    .auth-link { color: var(--sub); font-size: 13px; cursor: pointer; text-decoration: underline; }
    #auth-find { margin-top: 14px; background: #FFF3ED; border-radius: 12px; padding: 14px; border: 1px solid var(--border); }
    #auth-find h4 { margin-bottom: 10px; color: var(--primary); font-size: 14px; }
    .auth-msg { font-size: 13px; text-align: center; margin-top: 8px; padding: 8px 12px; border-radius: 8px; }
    .auth-msg.err { background: #FFE5E5; color: #C00; }
    .auth-msg.ok { background: #E5F7E5; color: #080; }

    /* APP */
    #app { display: none; padding-bottom: 72px; min-height: 100vh; }
    .app-header { position: sticky; top: 0; z-index: 100; background: white; border-bottom: 1px solid var(--border); padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(255,107,53,0.08); }
    .app-header h2 { font-size: 18px; font-weight: 800; color: var(--primary); }
    #header-user { font-size: 13px; color: var(--sub); cursor: pointer; }

    /* Bottom Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: white; border-top: 1px solid var(--border); display: flex; box-shadow: 0 -2px 12px rgba(0,0,0,0.07); }
    .nav-item { flex: 1; padding: 9px 4px 7px; text-align: center; cursor: pointer; color: #BBB; transition: color 0.2s; }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 22px; display: block; }
    .nav-label { font-size: 10px; font-weight: 600; display: block; margin-top: 2px; }

    /* Pages */
    .page { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
    .page.active { display: block; }

    /* Cards */
    .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .card-title { font-size: 16px; font-weight: 700; }
    .card-sub { font-size: 13px; color: var(--sub); }

    /* Buttons */
    .btn { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: inline-block; }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
    .btn-or { background: var(--primary); color: white; }
    .btn-or:hover { background: var(--primary-dark); }
    .btn-out { background: white; color: var(--primary); border: 2px solid var(--primary); }
    .btn-out:hover { background: var(--primary); color: white; }
    .btn-gray { background: #EEE; color: #555; }
    .btn-gray:hover { background: #DDD; }
    .btn-red { background: #FF4444; color: white; }
    .btn-red:hover { background: #D00; }

    /* Misc */
    .sec-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .sec-title { font-size: 18px; font-weight: 800; }
    .tabs { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
    .tab { padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; border: 2px solid var(--border); background: white; color: var(--sub); }
    .tab.active { background: var(--primary); border-color: var(--primary); color: white; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .b-or { background: #FFE8DC; color: var(--primary); }
    .b-bl { background: #DBEAFE; color: #2563EB; }
    .b-gr { background: #DCFCE7; color: #16A34A; }
    .b-gy { background: #F3F4F6; color: #6B7280; }
    .divider { height: 1px; background: var(--border); margin: 14px 0; }
    .empty { text-align: center; padding: 40px 20px; color: var(--sub); }
    .empty-icon { font-size: 40px; margin-bottom: 8px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
    .modal-box { background: white; border-radius: 20px 20px 0 0; padding: 22px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .modal-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .modal-title { font-size: 17px; font-weight: 800; }
    .modal-close { background: #F3F4F6; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 16px; line-height: 30px; }
    .fg { margin-bottom: 13px; }
    .fl { font-size: 13px; font-weight: 600; margin-bottom: 5px; display: block; color: var(--sub); }
    textarea.fi { resize: vertical; min-height: 80px; }
    select.fi { background: white; }

    /* Notice */
    .notice-type { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 6px; }
    .nt-notice { background: #E3F2FD; color: #1565C0; }
    .nt-rule { background: #FFF3E0; color: #E65100; }

    /* Trip Detail */
    #trip-detail { display: none; }
    .back-btn { display: flex; align-items: center; gap: 6px; color: var(--primary); font-weight: 700; cursor: pointer; margin-bottom: 16px; font-size: 15px; background: none; border: none; padding: 0; }
    .trip-tabs { display: flex; gap: 0; margin-bottom: 16px; border: 2px solid var(--primary); border-radius: 12px; overflow: hidden; }
    .trip-tab { flex: 1; padding: 9px 4px; text-align: center; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--primary); background: white; border: none; transition: all 0.2s; }
    .trip-tab.active { background: var(--primary); color: white; }
    .trip-tab-content { display: none; }
    .trip-tab-content.active { display: block; }

    /* Attendance */
    .att-btn { padding: 10px 22px; border-radius: 10px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s; }
    .att-yes { background: #DCFCE7; color: #16A34A; }
    .att-yes.on { background: #16A34A; color: white; }
    .att-no { background: #FEE2E2; color: #DC2626; }
    .att-no.on { background: #DC2626; color: white; }

    /* Album */
    .album-item { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 12px; background: white; }
    .album-item-header { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
    .album-item-photo { width: 100%; max-height: 280px; object-fit: cover; display: block; }
    .album-item-footer { padding: 10px 12px; border-top: 1px solid var(--border); background: #FAFAFA; }
    .comment-list { padding: 8px 12px; }
    .comment-row { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid #F5F5F5; }
    .comment-nick { font-size: 12px; font-weight: 700; color: var(--primary); min-width: 50px; }
    .comment-text { font-size: 13px; flex: 1; }
    .comment-time { font-size: 11px; color: #CCC; white-space: nowrap; }
    .comment-input-row { display: flex; gap: 8px; padding: 8px 12px; border-top: 1px solid var(--border); }
    .comment-input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; outline: none; }
    .comment-input:focus { border-color: var(--primary); }

    /* Expense / Settlement */
    .exp-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .settle-row { display: flex; justify-content: space-between; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; }
    .settle-me { background: #FFF3ED; }
    .cat-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-right: 4px; }
    .cat-식대 { background: #FFF3E0; color: #E65100; }
    .cat-숙소비 { background: #E8F5E9; color: #2E7D32; }
    .cat-이용료 { background: #E3F2FD; color: #1565C0; }
    .cat-교통비 { background: #F3E5F5; color: #6A1B9A; }
    .cat-기타 { background: #F5F5F5; color: #616161; }
    .settle-person-card { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
    .settle-person-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: #FFF8F2; cursor: pointer; }
    .settle-person-detail { padding: 10px 14px; border-top: 1px solid var(--border); display: none; }
    .settle-person-detail.open { display: block; }
    .final-settle-card { border-radius: 14px; overflow: hidden; margin-bottom: 10px; border: 2px solid var(--border); }
    .final-settle-header { background: linear-gradient(135deg, #FF6B35, #FF9A5A); color: white; padding: 14px 16px; }
    .final-settle-body { background: white; padding: 14px 16px; }
    .transfer-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #F5F5F5; flex-wrap: wrap; }
    .transfer-from { background: #FEE2E2; color: #DC2626; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 13px; }
    .transfer-to { background: #DCFCE7; color: #16A34A; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 13px; }
    .transfer-amt { font-size: 16px; font-weight: 800; color: var(--primary); }
    .account-box { background: #F8F8F8; border-radius: 8px; padding: 8px 12px; margin-top: 6px; font-size: 12px; color: #555; }
    .account-box strong { color: var(--text); }

    /* Vote */
    .vote-bar { height: 7px; background: #FFE0CC; border-radius: 4px; margin-top: 6px; overflow: hidden; }
    .vote-bar-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.4s; }

    /* Child chip */
    .child-chip { display: inline-flex; align-items: center; gap: 4px; background: #FFE8DC; color: var(--primary); padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin: 2px; }

  </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>🚗 아빠 어디가</h1>
      <p>아빠들의 여행 모임</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">로그인</button>
      <button class="auth-tab" onclick="switchAuth('register')">회원가입</button>
    </div>
    <div id="login-form">
      <div class="auth-form">
        <input class="fi" id="login-email" type="email" placeholder="이메일">
        <input class="fi" id="login-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn-primary" onclick="doLogin()">로그인</button>
      </div>
      <div class="auth-links">
        <span class="auth-link" onclick="showFindPanel('id')">아이디 찾기</span>
        <span style="color:#DDD">|</span>
        <span class="auth-link" onclick="showFindPanel('pw')">비밀번호 찾기</span>
      </div>
    </div>
    <div id="register-form" style="display:none">
      <div class="auth-form">
        <input class="fi" id="reg-email" type="email" placeholder="이메일 *">
        <input class="fi" id="reg-pw" type="password" placeholder="비밀번호 (6자 이상) *">
        <input class="fi" id="reg-name" type="text" placeholder="실명 *">
        <input class="fi" id="reg-nick" type="text" placeholder="별명 (닉네임) *">
        <input class="fi" id="reg-phone" type="tel" placeholder="연락처 (선택)">
        <div style="display:flex;gap:8px">
          <label style="flex:1;border:2px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all 0.2s" id="role-dad-label">
            <input type="radio" name="reg-role" id="role-dad" value="dad" checked style="display:none">
            <div style="font-size:20px">👨</div>
            <div style="font-weight:700;font-size:13px">아빠</div>
          </label>
          <label style="flex:1;border:2px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all 0.2s" id="role-mom-label">
            <input type="radio" name="reg-role" id="role-mom" value="mom" style="display:none">
            <div style="font-size:20px">👩</div>
            <div style="font-weight:700;font-size:13px">엄마</div>
          </label>
        </div>
        <button class="btn-primary" onclick="doRegister()">가입하기</button>
      </div>
    </div>
    <div id="auth-find" style="display:none">
      <div id="find-id-panel" style="display:none">
        <h4>아이디 찾기</h4>
        <input class="fi" id="find-name" type="text" placeholder="실명 또는 별명" style="margin-bottom:8px">
        <button class="btn-primary" onclick="findMyId()">찾기</button>
      </div>
      <div id="find-pw-panel" style="display:none">
        <h4>비밀번호 찾기</h4>
        <input class="fi" id="find-pw-email" type="email" placeholder="가입한 이메일" style="margin-bottom:8px">
        <button class="btn-primary" onclick="findMyPw()">재설정 메일 발송</button>
      </div>
    </div>
    <div id="auth-msg"></div>

  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <h2>🚗 아빠 어디가</h2>
    <span id="header-user" onclick="goPage('mypage')"></span>
  </div>

  <!-- 공지/규칙 -->
  <div class="page active" id="page-home">
    <div class="sec-hd">
      <span class="sec-title">📢 공지 &amp; 규칙</span>
      <button class="btn btn-or btn-sm" id="notice-add-btn" onclick="openNoticeModal()" style="display:none">+ 작성</button>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="filterNotices('all',this)">전체</div>
      <div class="tab" onclick="filterNotices('notice',this)">공지사항</div>
      <div class="tab" onclick="filterNotices('rule',this)">모임 규칙</div>
    </div>
    <div id="notices-list"></div>
  </div>

  <!-- 여행 -->
  <div class="page" id="page-trips">
    <div id="trips-list-view">
      <div class="sec-hd">
        <span class="sec-title">🗺️ 여행</span>
        <button class="btn btn-or btn-sm" id="trip-add-btn" onclick="openTripModal()" style="display:none">+ 여행 추가</button>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="filterTrips('all',this)">전체</div>
        <div class="tab" onclick="filterTrips('planned',this)">예정</div>
        <div class="tab" onclick="filterTrips('completed',this)">완료</div>
      </div>
      <div id="trips-list"></div>
    </div>

    <!-- 여행 상세 -->
    <div id="trip-detail">
      <button class="back-btn" onclick="showTripList()">← 목록으로</button>
      <div id="trip-info-card"></div>

      <div class="trip-tabs">
        <button class="trip-tab active" onclick="switchTripTab('info',this)">기본 정보</button>
        <button class="trip-tab" onclick="switchTripTab('album',this)">📸 앨범</button>
        <button class="trip-tab" onclick="switchTripTab('settle',this)">💰 정산</button>
      </div>

      <!-- 기본 정보 탭 -->
      <div class="trip-tab-content active" id="ttab-info">
        <div id="trip-attend-section"></div>
        <div id="trip-supply-section"></div>
      </div>

      <!-- 앨범 탭 -->
      <div class="trip-tab-content" id="ttab-album">
        <div class="sec-hd" style="margin-bottom:12px">
          <span style="font-weight:700">📸 앨범</span>
          <button class="btn btn-or btn-sm" onclick="openAlbumLinkModal()">🔗 링크 추가</button>
        </div>
        <div id="album-list"></div>
      </div>

      <!-- 정산 탭 -->
      <div class="trip-tab-content" id="ttab-settle">
        <div class="sec-hd" style="margin-bottom:12px">
          <span style="font-weight:700">경비 정산</span>
          <button class="btn btn-or btn-sm" onclick="openExpenseModal()">+ 경비 추가</button>
        </div>
        <div id="expense-list"></div>
        <div id="settle-summary"></div>
      </div>
    </div>
  </div>

  <!-- 투표 -->
  <div class="page" id="page-vote">
    <div class="sec-hd">
      <span class="sec-title">🗳️ 여행지 투표</span>
      <button class="btn btn-or btn-sm" id="vote-add-btn" onclick="openVoteModal()" style="display:none">+ 투표 생성</button>
    </div>
    <div id="votes-list"></div>
  </div>

  <!-- 마이페이지 -->
  <div class="page" id="page-mypage">
    <div class="sec-title" style="margin-bottom:16px">👤 마이페이지</div>
    <div class="card" id="my-profile-card"></div>
    <div class="sec-hd" style="margin-top:20px">
      <span class="sec-title" style="font-size:16px">👶 아이 정보</span>
      <button class="btn btn-or btn-sm" onclick="openChildModal()">+ 아이 추가</button>
    </div>
    <div id="children-list"></div>
    <div style="margin-top:24px;display:flex;gap:10px">
      <button class="btn btn-gray" style="flex:1" onclick="doLogout()">로그아웃</button>
      <button class="btn btn-red" style="flex:1" onclick="doWithdraw()">탈퇴하기</button>
    </div>
  </div>

  <!-- 관리자 -->
  <div class="page" id="page-admin">
    <div class="sec-title" style="margin-bottom:16px">⚙️ 관리자</div>
    <div id="admin-members"></div>
  </div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="goPage('home')" id="nav-home"><span class="nav-icon">📢</span><span class="nav-label">공지</span></div>
    <div class="nav-item" onclick="goPage('trips')" id="nav-trips"><span class="nav-icon">🗺️</span><span class="nav-label">여행</span></div>
    <div class="nav-item" onclick="goPage('vote')" id="nav-vote"><span class="nav-icon">🗳️</span><span class="nav-label">투표</span></div>
    <div class="nav-item" onclick="goPage('mypage')" id="nav-mypage"><span class="nav-icon">👤</span><span class="nav-label">내 정보</span></div>
    <div class="nav-item" onclick="goPage('admin')" id="nav-admin" style="display:none"><span class="nav-icon">⚙️</span><span class="nav-label">관리자</span></div>
  </nav>
</div>

<div id="modal-container"></div>

<script type="module">

import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, deleteUser, reauthenticateWithCredential, EmailAuthProvider } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc, collection, query, where, orderBy, onSnapshot, addDoc, getDocs, serverTimestamp, arrayUnion, arrayRemove, writeBatch, limit } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDkDpquJP8-VZKFAgOjJgkZKf5Z9Uki910",
  authDomain: "appawherewego.firebaseapp.com",
  projectId: "appawherewego",
  storageBucket: "appawherewego.firebasestorage.app",

  measurementId: "G-0K1JMJD685"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// STATE
let currentUser = null, currentUserDoc = null;
let noticeFilter = 'all', tripFilter = 'all';
let allNotices = [], allTrips = [], allUsers = {};
let currentTripId = null;
let unsubNotices = null, unsubTrips = null, unsubVotes = null;

// ========== AUTH ==========
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists() && snap.data().active !== false) {
        currentUserDoc = snap.data();
        await loadAllUsers();
        showApp();
      } else {
        await signOut(auth);
        showAuthMsg('존재하지 않는 계정이거나 탈퇴한 계정입니다.', 'err');
      }
    } catch(e) { await signOut(auth); showAuthMsg('오류: ' + e.message, 'err'); }
  } else {
    currentUser = null; currentUserDoc = null; showAuth();
  }
});

// 역할 선택 라디오 스타일
document.addEventListener('change', e => {
  if (e.target.name === 'reg-role') {
    document.getElementById('role-dad-label').style.cssText = e.target.value==='dad'
      ? 'flex:1;border:2px solid var(--primary);border-radius:10px;padding:10px;text-align:center;cursor:pointer;background:#FFF3ED'
      : 'flex:1;border:2px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer';
    document.getElementById('role-mom-label').style.cssText = e.target.value==='mom'
      ? 'flex:1;border:2px solid var(--primary);border-radius:10px;padding:10px;text-align:center;cursor:pointer;background:#FFF3ED'
      : 'flex:1;border:2px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer';
  }
});

window.switchAuth = (tab) => {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('login-form').style.display = tab==='login'?'':'none';
  document.getElementById('register-form').style.display = tab==='register'?'':'none';
  document.getElementById('auth-find').style.display = 'none';
  document.getElementById('auth-msg').innerHTML = '';
};

window.showFindPanel = (type) => {
  const panel = document.getElementById('auth-find');
  const idP = document.getElementById('find-id-panel');
  const pwP = document.getElementById('find-pw-panel');
  const showing = panel.style.display !== 'none';
  const same = (type==='id'&&idP.style.display!=='none')||(type==='pw'&&pwP.style.display!=='none');
  if (showing && same) { panel.style.display='none'; return; }
  panel.style.display = '';
  idP.style.display = type==='id'?'':'none';
  pwP.style.display = type==='pw'?'':'none';
};

window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  if (!email||!pw) return showAuthMsg('이메일과 비밀번호를 입력해주세요.','err');
  try { await signInWithEmailAndPassword(auth, email, pw); }
  catch(e) {
    const m={'auth/user-not-found':'등록되지 않은 이메일입니다.','auth/wrong-password':'비밀번호가 틀렸습니다.','auth/invalid-credential':'이메일 또는 비밀번호가 올바르지 않습니다.','auth/too-many-requests':'잠시 후 다시 시도해주세요.'};
    showAuthMsg(m[e.code]||'로그인 실패: '+e.message,'err');
  }
};

window.doRegister = async () => {
  const email=document.getElementById('reg-email').value.trim(), pw=document.getElementById('reg-pw').value;
  const name=document.getElementById('reg-name').value.trim(), nick=document.getElementById('reg-nick').value.trim();
  const phone=document.getElementById('reg-phone').value.trim();
  const role=document.querySelector('input[name="reg-role"]:checked')?.value||'dad';
  if (!email||!pw||!name||!nick) return showAuthMsg('필수 항목을 모두 입력해주세요.','err');
  if (pw.length<6) return showAuthMsg('비밀번호는 6자 이상이어야 합니다.','err');
  try {
    const firstSnap = await getDocs(query(collection(db,'users'),limit(1)));
    const isFirst = firstSnap.empty;
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await setDoc(doc(db,'users',cred.user.uid), { email, realname:name, nick, phone, role, isAdmin:isFirst, active:true, children:[], createdAt:serverTimestamp() });
  } catch(e) {
    const m={'auth/email-already-in-use':'이미 사용 중인 이메일입니다.','auth/invalid-email':'올바른 이메일 형식이 아닙니다.','auth/weak-password':'비밀번호가 너무 약합니다.'};
    showAuthMsg(m[e.code]||'가입 실패: '+e.message,'err');
  }
};

window.findMyId = async () => {
  const name = document.getElementById('find-name').value.trim();
  if (!name) return showAuthMsg('이름 또는 별명을 입력해주세요.','err');
  const [s1,s2] = await Promise.all([getDocs(query(collection(db,'users'),where('realname','==',name))),getDocs(query(collection(db,'users'),where('nick','==',name)))]);
  const docs=[...s1.docs,...s2.docs];
  if (!docs.length) return showAuthMsg('해당 이름으로 가입된 계정이 없습니다.','err');
  const email=docs[0].data().email;
  showAuthMsg('가입된 이메일: '+email.substring(0,2)+'****'+email.substring(email.indexOf('@')),'ok');
};

window.findMyPw = async () => {
  const email=document.getElementById('find-pw-email').value.trim();
  if (!email) return showAuthMsg('이메일을 입력해주세요.','err');
  try { await sendPasswordResetEmail(auth,email); showAuthMsg('비밀번호 재설정 메일을 발송했습니다.','ok'); }
  catch(e) { showAuthMsg({'auth/user-not-found':'등록되지 않은 이메일입니다.','auth/invalid-email':'올바른 이메일 형식이 아닙니다.'}[e.code]||'발송 실패','err'); }
};

function showAuthMsg(msg,type) { document.getElementById('auth-msg').innerHTML=`<div class="auth-msg ${type}">${msg}</div>`; }

// ========== APP ==========
function showAuth() { document.getElementById('auth-overlay').style.display='flex'; document.getElementById('app').style.display='none'; }

function showApp() {
  document.getElementById('auth-overlay').style.display='none';
  document.getElementById('app').style.display='block';
  const isMom = currentUserDoc.role === 'mom';
  const isAdmin = currentUserDoc.isAdmin;
  document.getElementById('header-user').textContent = (isMom ? '👩 ' : '👨 ') + (currentUserDoc.nick||'') + ' 님';
  if (isAdmin) {
    ['nav-admin','notice-add-btn','trip-add-btn','vote-add-btn'].forEach(id => { const el=document.getElementById(id); if(el) el.style.display=''; });
  }
  // 엄마: 정산 탭 숨김
  if (isMom) {
    document.querySelector('.trip-tab[onclick*="settle"]')?.remove();
  }
  startListeners();
  goPage('home');
}

window.goPage = (page) => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page)?.classList.add('active');
  if (page==='mypage') renderMyPage();
  if (page==='admin') renderAdminMembers();
  if (page==='trips') showTripList();
};

function startListeners() {
  if (unsubNotices) unsubNotices();
  unsubNotices = onSnapshot(query(collection(db,'notices'),orderBy('pinned','desc'),orderBy('createdAt','desc')), snap=>{
    allNotices=snap.docs.map(d=>({id:d.id,...d.data()})); renderNotices();
  }, err=>console.error('notices:',err));

  if (unsubTrips) unsubTrips();
  unsubTrips = onSnapshot(query(collection(db,'trips'),orderBy('createdAt','desc')), snap=>{
    allTrips=snap.docs.map(d=>({id:d.id,...d.data()})); renderTrips();
  }, err=>console.error('trips:',err));

  if (unsubVotes) unsubVotes();
  unsubVotes = onSnapshot(query(collection(db,'votes'),orderBy('createdAt','desc')), snap=>{
    renderVotesData(snap.docs.map(d=>({id:d.id,...d.data()})));
  }, err=>console.error('votes:',err));
}

async function loadAllUsers() {
  try {
    const snap = await getDocs(query(collection(db,'users'),where('active','==',true)));
    snap.docs.forEach(d=>{ allUsers[d.id]=d.data(); });
  } catch(e) { console.error('loadUsers:',e); }
}

// ========== NOTICES ==========
window.filterNotices = (type,el) => {
  noticeFilter=type;
  document.querySelectorAll('#page-home .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderNotices();
};

function renderNotices() {
  const list=document.getElementById('notices-list');
  let items=allNotices;
  if (noticeFilter!=='all') items=items.filter(n=>n.type===noticeFilter);
  if (!items.length) { list.innerHTML=`<div class="empty"><div class="empty-icon">📭</div>등록된 내용이 없습니다.</div>`; return; }
  list.innerHTML=items.map(n=>`
    <div class="card" style="cursor:pointer" onclick="showNoticeDetail('${n.id}')">
      <span class="notice-type nt-${n.type}">${n.type==='notice'?'📢 공지':'📋 규칙'}</span>
      ${n.pinned?'<span class="badge b-or" style="margin-left:4px">📌 고정</span>':''}
      <div class="card-title" style="margin-top:6px">${esc(n.title)}</div>
      <div class="card-sub" style="margin-top:4px">${esc(n.content.substring(0,60))}${n.content.length>60?'...':''}</div>
      <div class="card-sub" style="margin-top:8px">${fmtDate(n.createdAt)}</div>
    </div>`).join('');
}

window.showNoticeDetail = (id) => {
  const n=allNotices.find(x=>x.id===id); if(!n) return;
  const adm=currentUserDoc?.isAdmin;
  openModal(`<div class="modal-hd"><span class="modal-title">${esc(n.title)}</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <span class="notice-type nt-${n.type}">${n.type==='notice'?'📢 공지':'📋 규칙'}</span>
    <p style="margin-top:12px;line-height:1.7;white-space:pre-wrap">${esc(n.content)}</p>
    <div class="card-sub" style="margin-top:12px">${fmtDate(n.createdAt)}</div>
    ${adm?`<div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-out btn-sm" onclick="openNoticeModal('${n.id}')">수정</button>
      <button class="btn btn-red btn-sm" onclick="deleteNotice('${n.id}')">삭제</button>
      <button class="btn btn-gray btn-sm" onclick="togglePin('${n.id}',${n.pinned})">${n.pinned?'고정 해제':'📌 고정'}</button>
    </div>`:''}`);
};

window.openNoticeModal = (id='') => {
  const n=id?allNotices.find(x=>x.id===id):null;
  openModal(`<div class="modal-hd"><span class="modal-title">${n?'공지 수정':'공지 작성'}</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="fg"><label class="fl">유형</label><select class="fi" id="m-ntype"><option value="notice" ${n?.type==='notice'?'selected':''}>📢 공지사항</option><option value="rule" ${n?.type==='rule'?'selected':''}>📋 모임 규칙</option></select></div>
    <div class="fg"><label class="fl">제목</label><input class="fi" id="m-ntitle" value="${esc(n?.title||'')}"></div>
    <div class="fg"><label class="fl">내용</label><textarea class="fi" id="m-ncontent" rows="5">${esc(n?.content||'')}</textarea></div>
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer"><input type="checkbox" id="m-npin" ${n?.pinned?'checked':''}> 고정 게시</label>
    <button class="btn btn-or" style="width:100%" onclick="saveNotice('${id}')">저장</button>`);
};

window.saveNotice = async (id) => {
  const type=document.getElementById('m-ntype').value, title=document.getElementById('m-ntitle').value.trim();
  const content=document.getElementById('m-ncontent').value.trim(), pinned=document.getElementById('m-npin').checked;
  if (!title||!content) return alert('제목과 내용을 입력해주세요.');
  const data={type,title,content,pinned};
  if (id) await updateDoc(doc(db,'notices',id),data);
  else await addDoc(collection(db,'notices'),{...data,createdBy:currentUser.uid,createdAt:serverTimestamp()});
  closeModal();
};
window.deleteNotice = async (id) => { if (!confirm('삭제하시겠습니까?')) return; await deleteDoc(doc(db,'notices',id)); closeModal(); };
window.togglePin = async (id,pinned) => { await updateDoc(doc(db,'notices',id),{pinned:!pinned}); closeModal(); };

// ========== TRIPS ==========
window.filterTrips = (type,el) => {
  tripFilter=type;
  document.querySelectorAll('#trips-list-view .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); renderTrips();
};

window.showTripList = () => {
  document.getElementById('trips-list-view').style.display='';
  document.getElementById('trip-detail').style.display='none';
  currentTripId=null;
};

function renderTrips() {
  const list=document.getElementById('trips-list');
  let items=allTrips;
  if (tripFilter!=='all') items=items.filter(t=>t.status===tripFilter);
  if (!items.length) { list.innerHTML=`<div class="empty"><div class="empty-icon">🗺️</div>여행 일정이 없습니다.</div>`; return; }
  list.innerHTML=items.map(t=>`
    <div class="card" style="cursor:pointer" onclick="showTripDetail('${t.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <span class="badge ${t.status==='planned'?'b-bl':'b-gy'}">${t.status==='planned'?'예정':'완료'}</span>
          <div class="card-title" style="margin-top:6px">${esc(t.title)}</div>
          <div class="card-sub">📍 ${esc(t.location||'-')} ${t.naverMapUrl?`<a href="${esc(t.naverMapUrl)}" target="_blank" rel="noopener" style="color:var(--primary);font-size:11px;text-decoration:none">🗺️ 지도</a>`:''}</div>
          <div class="card-sub">📅 ${t.dateStart||''}${t.dateEnd&&t.dateEnd!==t.dateStart?' ~ '+t.dateEnd:''}</div>
        </div>
        <span style="font-size:28px">🚗</span>
      </div>
    </div>`).join('');
}

window.showTripDetail = async (tripId) => {
  currentTripId = tripId;
  document.getElementById('trips-list-view').style.display = 'none';
  document.getElementById('trip-detail').style.display = 'block';

  const trip = allTrips.find(t=>t.id===tripId);
  if (!trip) return;
  const adm = currentUserDoc?.isAdmin;

  // 여행 정보 카드
  document.getElementById('trip-info-card').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <span class="badge ${trip.status==='planned'?'b-bl':'b-gy'}">${trip.status==='planned'?'예정':'완료'}</span>
          <h2 style="margin-top:8px;font-size:20px;font-weight:800">${esc(trip.title)}</h2>
          <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
            <div>📍 <strong>${esc(trip.location||'-')}</strong> ${trip.naverMapUrl?`<a href="${esc(trip.naverMapUrl)}" target="_blank" rel="noopener" style="color:var(--primary);font-size:13px;text-decoration:none;margin-left:4px">🗺️ 네이버 지도</a>`:''}</div>
            <div>📅 ${trip.dateStart||''}${trip.dateEnd&&trip.dateEnd!==trip.dateStart?' ~ '+trip.dateEnd:''}</div>
            ${trip.description?`<div style="margin-top:6px;color:#555;line-height:1.6;white-space:pre-wrap;font-size:14px">${esc(trip.description)}</div>`:''}
          </div>
        </div>
        ${adm?`<div style="display:flex;flex-direction:column;gap:6px">
          <button class="btn btn-gray btn-sm" onclick="openTripModal('${tripId}')">수정</button>
          <button class="btn btn-red btn-sm" onclick="deleteTrip('${tripId}')">삭제</button>
        </div>`:''}
      </div>
    </div>`;

  // 엄마는 정산 탭 숨김
  const settleTabBtn = document.querySelector('.trip-tab[onclick*="settle"]');
  if (settleTabBtn) settleTabBtn.style.display = currentUserDoc.role==='mom' ? 'none' : '';

  // 첫 탭으로 초기화
  switchTripTab('info', document.querySelector('.trip-tab'));

  // 기본정보(참석+준비물) 탭 로드
  loadAttendance(tripId);
  loadSupplies(tripId);

  // 앨범 탭 초기화 (탭 클릭 시 로드)
  document.getElementById('album-list').innerHTML = '';

  // 정산 탭 초기화
  document.getElementById('expense-list').innerHTML = '';
  document.getElementById('settle-summary').innerHTML = '';
};

window.switchTripTab = (tab, el) => {
  document.querySelectorAll('.trip-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.trip-tab-content').forEach(t=>t.classList.remove('active'));
  if (el) el.classList.add('active');
  else document.querySelector('.trip-tab')?.classList.add('active');
  document.getElementById('ttab-'+tab)?.classList.add('active');

  if (tab==='album' && currentTripId) loadAlbums(currentTripId);
  if (tab==='settle' && currentTripId) loadExpenses(currentTripId);
};

// ---- 참석 ----
async function loadAttendance(tripId) {
  const attSection = document.getElementById('trip-attend-section');
  attSection.innerHTML = '<div class="card-sub" style="padding:10px">로딩 중...</div>';
  try {
    const snap = await getDocs(collection(db,'trips',tripId,'attendees'));
    const attendees = {};
    snap.docs.forEach(d=>{ attendees[d.id]=d.data(); });
    const myAtt = attendees[currentUser.uid];
    const yesAtt = Object.entries(attendees).filter(([,v])=>v.attending);
    const noAtt = Object.entries(attendees).filter(([,v])=>!v.attending);
    attSection.innerHTML = `
      <div class="card">
        <div style="font-weight:700;margin-bottom:12px">✅ 참석 여부</div>
        <div style="display:flex;gap:10px;margin-bottom:14px">
          <button class="att-btn att-yes ${myAtt?.attending===true?'on':''}" onclick="setAttendance('${tripId}',true)">✅ 참석</button>
          <button class="att-btn att-no ${myAtt?.attending===false?'on':''}" onclick="setAttendance('${tripId}',false)">❌ 미참석</button>
        </div>
        <div class="card-sub">✅ 참석 (${yesAtt.length}명): ${yesAtt.map(([uid])=>esc(allUsers[uid]?.nick||uid)).join(', ')||'없음'}</div>
        <div class="card-sub" style="margin-top:4px">❌ 미참석 (${noAtt.length}명): ${noAtt.map(([uid])=>esc(allUsers[uid]?.nick||uid)).join(', ')||'없음'}</div>
      </div>`;
  } catch(e) { attSection.innerHTML=`<div class="card"><div class="card-sub">오류: ${e.message}</div></div>`; }
}

// ---- 준비물 ----
async function loadSupplies(tripId) {
  const section = document.getElementById('trip-supply-section');
  if (!section) return;
  const isMom = currentUserDoc.role === 'mom';
  try {
    const snap = await getDocs(query(collection(db,'trips',tripId,'supplies'), orderBy('createdAt','asc')));
    const supplies = snap.docs.map(d=>({id:d.id,...d.data()}));

    section.innerHTML = `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-weight:700">🎒 준비물</div>
          ${!isMom?`<button class="btn btn-or btn-sm" onclick="openSupplyModal('${tripId}')">+ 추가</button>`:''}
        </div>
        ${!supplies.length
          ? `<div class="card-sub">등록된 준비물이 없습니다.</div>`
          : supplies.map(s => {
              const assignees = s.assignees?.map(uid => allUsers[uid]?.nick||uid).join(', ') || '미지정';
              const isDone = s.done || false;
              return `
              <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F5F5F5">
                ${!isMom?`<input type="checkbox" ${isDone?'checked':''} onchange="toggleSupplyDone('${tripId}','${s.id}',this.checked)" style="width:18px;height:18px;accent-color:var(--primary);cursor:pointer">`:
                  `<span style="font-size:16px">${isDone?'✅':'⬜'}</span>`}
                <div style="flex:1">
                  <span style="font-weight:600;font-size:14px;${isDone?'text-decoration:line-through;color:var(--sub)':''}">${esc(s.item)}</span>
                  <div style="font-size:12px;color:var(--sub)">담당: <strong>${esc(assignees)}</strong> ${s.note?'· '+esc(s.note):''}</div>
                </div>
                ${!isMom&&(currentUserDoc.isAdmin||s.addedBy===currentUser.uid)?`<button class="btn btn-gray btn-sm" onclick="deleteSupply('${tripId}','${s.id}')">삭제</button>`:''}
              </div>`;
            }).join('')}
      </div>`;
  } catch(e) { if(section) section.innerHTML=''; }
}

window.openSupplyModal = (tripId) => {
  const userOpts = Object.entries(allUsers).map(([uid,u]) =>
    `<label style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer">
      <input type="checkbox" class="sup-chk" value="${uid}">
      <span>${esc(u.nick)}</span><span style="color:var(--sub);font-size:12px">${esc(u.realname)}</span>
    </label>`).join('');
  openModal(`
    <div class="modal-hd"><span class="modal-title">🎒 준비물 추가</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="fg"><label class="fl">준비물 이름 *</label><input class="fi" id="m-sitem" placeholder="예: 텐트, 돗자리, 구급약"></div>
    <div class="fg"><label class="fl">메모</label><input class="fi" id="m-snote" placeholder="예: 2인용, 큰 사이즈"></div>
    <div class="fg"><label class="fl">담당자 (선택)</label>
      <div style="max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:4px 8px">${userOpts}</div>
    </div>

// ---- 정산 ----
async function loadExpenses(tripId) {
  const expList=document.getElementById('expense-list'), summary=document.getElementById('settle-summary');
  expList.innerHTML='<div class="card-sub" style="padding:10px">로딩 중...</div>';
  summary.innerHTML='';
  try {
    const snap = await getDocs(collection(db,'trips',tripId,'expenses'));
    const expenses = snap.docs.map(d=>({id:d.id,...d.data()}));
    const adm = currentUserDoc?.isAdmin;

    if (!expenses.length) { expList.innerHTML=`<div class="empty"><div class="empty-icon">💰</div>등록된 경비가 없습니다.<br><span style="font-size:13px">위 "+ 경비 추가" 버튼으로 추가해주세요.</span></div>`; return; }

    // 카테고리별 그룹
    const catMap = {};
    expenses.forEach(e => {
      const cat = e.category || '🛒 기타';
      if (!catMap[cat]) catMap[cat] = [];
      catMap[cat].push(e);
    });

    expList.innerHTML = Object.entries(catMap).map(([cat, items]) => `
      <div class="card" style="margin-bottom:10px">
        <div style="font-weight:800;margin-bottom:10px;font-size:15px">${esc(cat)}</div>
        ${items.map(e => {
          const share = Math.ceil(e.amount / (e.participants?.length||1));
          const catKey = cat.replace(/[^가-힣]/g,'').trim();
          return `
          <div class="exp-row">
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px">${esc(e.title)}</div>
              ${e.memo?`<div class="card-sub">📝 ${esc(e.memo)}</div>`:''}
              <div class="card-sub">${e.participants?.length||0}명 · 1인 <strong>${won(share)}</strong></div>
              <div class="card-sub" style="margin-top:2px">${e.participants?.map(uid=>`<span style="display:inline-block;background:#F5F5F5;border-radius:4px;padding:1px 5px;font-size:11px;margin:1px">${esc(allUsers[uid]?.nick||uid)}</span>`).join('')||''}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:10px">
              <div style="font-size:15px;font-weight:800;color:var(--primary)">${won(e.amount)}</div>
              ${adm||e.addedBy===currentUser.uid?`<button class="btn btn-gray btn-sm" onclick="deleteExpense('${tripId}','${e.id}')">삭제</button>`:''}
            </div>
          </div>`;
        }).join('')}
        <div style="display:flex;justify-content:flex-end;padding-top:8px;font-weight:700;color:var(--sub);font-size:13px">
          소계: <span style="color:var(--primary);margin-left:6px">${won(items.reduce((s,e)=>s+e.amount,0))}</span>
        </div>
      </div>`).join('');

    // ── 순잔액(net balance) 계산 ──
    // 양수 = 받아야 할 돈, 음수 = 내야 할 돈
    const balance = {};
    const personDetail = {}; // uid → [{title, cat, amount, paidBy, share}]
    expenses.forEach(e => {
      if (!e.participants?.length) return;
      const payer = e.paidBy || e.addedBy;
      const share = Math.round(e.amount / e.participants.length);
      const cat = e.category || '🛒 기타';
      // 결제자는 전액 냈으므로 +amount
      balance[payer] = (balance[payer]||0) + e.amount;
      // 참여자는 각자 share만큼 -
      e.participants.forEach(uid => {
        balance[uid] = (balance[uid]||0) - share;
        if (!personDetail[uid]) personDetail[uid] = [];
        personDetail[uid].push({ title:e.title, cat, share, payer });
      });
    });

    const totalAmt = expenses.reduce((s,e)=>s+e.amount,0);
    const catTotal = {};
    expenses.forEach(e => { const c=e.category||'🛒 기타'; catTotal[c]=(catTotal[c]||0)+e.amount; });

    // ── 최소 이체 계산 (greedy) ──
    function simplifyDebts(bal) {
      const pos = Object.entries(bal).filter(([,v])=>v>50).sort((a,b)=>b[1]-a[1]).map(([uid,v])=>({uid,v}));
      const neg = Object.entries(bal).filter(([,v])=>v<-50).sort((a,b)=>a[1]-b[1]).map(([uid,v])=>({uid,v:-v}));
      const txns = [];
      let i=0, j=0;
      while(i<pos.length && j<neg.length){
        const t=Math.min(pos[i].v, neg[j].v);
        txns.push({from:neg[j].uid, to:pos[i].uid, amount:Math.round(t)});
        pos[i].v-=t; neg[j].v-=t;
        if(pos[i].v<50) i++;
        if(neg[j].v<50) j++;
      }
      return txns;
    }
    const transactions = simplifyDebts({...balance});

    summary.innerHTML = `
      <div class="card">
        <div style="font-weight:800;font-size:15px;margin-bottom:12px">📊 카테고리별 합계</div>
        ${Object.entries(catTotal).map(([cat,amt])=>`
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #F5F5F5;font-size:14px">
            <span>${esc(cat)}</span><span style="font-weight:700">${won(amt)}</span>
          </div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding:10px 0 4px;font-weight:800;font-size:15px">
          <span>전체 합계</span><span style="color:var(--primary)">${won(totalAmt)}</span>
        </div>
      </div>

      <div class="final-settle-card">
        <div class="final-settle-header">
          <div style="font-weight:800;font-size:16px;margin-bottom:2px">💸 최종 정산</div>
          <div style="font-size:12px;opacity:0.85">아래 금액을 이체하면 정산 완료!</div>
        </div>
        <div class="final-settle-body">
          ${!transactions.length
            ? '<div style="text-align:center;padding:16px;color:var(--sub);font-size:13px">정산할 내역이 없습니다 🎉</div>'
            : transactions.map(t => {
                const toUser = allUsers[t.to]||{};
                const hasAccount = toUser.bankName || toUser.accountNum;
                return `
                <div class="transfer-row">
                  <span class="transfer-from">${esc(allUsers[t.from]?.nick||t.from)}</span>
                  <span style="color:var(--sub);font-size:18px">→</span>
                  <span class="transfer-to">${esc(toUser.nick||t.to)}</span>
                  <span class="transfer-amt">${won(t.amount)}</span>
                  ${hasAccount?`<div class="account-box" style="width:100%">
                    🏦 <strong>${esc(toUser.bankName||'')}</strong>
                    ${toUser.accountNum?`<span style="font-family:monospace;letter-spacing:1px"> ${esc(toUser.accountNum)}</span>`:''}
                    ${toUser.accountHolder?`· <strong>${esc(toUser.accountHolder)}</strong>`:''}
                  </div>`:'<div style="font-size:11px;color:#CCC;width:100%">계좌 정보 없음 (마이페이지에서 등록)</div>'}
                </div>`;
              }).join('')}
        </div>
      </div>

      <div class="card">
        <div style="font-weight:800;font-size:15px;margin-bottom:12px">👤 인원별 상세 내역</div>
        ${Object.keys(personDetail).length===0
          ? '<div class="card-sub">내역 없음</div>'
          : Object.entries(personDetail).map(([uid,items])=>{
              const isMe = uid===currentUser.uid;
              const myBal = Math.round(balance[uid]||0);
              const balLabel = myBal>50
                ? `<span style="color:#16A34A;font-weight:700">+${won(myBal)} 받을 돈</span>`
                : myBal<-50
                ? `<span style="color:#DC2626;font-weight:700">${won(myBal)} 낼 돈</span>`
                : `<span style="color:var(--sub);font-size:12px">정산 완료</span>`;
              return `
              <div class="settle-person-card">
                <div class="settle-person-header" onclick="toggleSettleDetail('${uid}')">
                  <div>
                    ${isMe?`<span style="font-weight:800">나 (${esc(allUsers[uid]?.nick||uid)})</span> <span class="badge b-or" style="font-size:10px">나</span>`
                         :`<span style="font-weight:700">${esc(allUsers[uid]?.nick||uid)}</span>`}
                  </div>
                  <div style="display:flex;align-items:center;gap:8px">
                    ${balLabel}
                    <span style="color:var(--sub);font-size:12px">▾</span>
                  </div>
                </div>
                <div class="settle-person-detail" id="settle-detail-${uid}">
                  ${items.map(i=>`
                    <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid #F9F9F9">
                      <div>
                        <span style="font-size:11px;background:#F0F0F0;border-radius:4px;padding:1px 5px;margin-right:4px">${esc(i.cat)}</span>
                        ${esc(i.title)}
                        <span style="color:var(--sub);font-size:11px"> (결제: ${esc(allUsers[i.payer]?.nick||i.payer)})</span>
                      </div>
                      <span style="font-weight:700;color:#DC2626;margin-left:8px;white-space:nowrap">-${won(i.share)}</span>
                    </div>`).join('')}
                  <div style="display:flex;justify-content:flex-end;padding-top:6px;font-size:13px">
                    내 부담 합계: <strong style="margin-left:6px">${won(items.reduce((s,i)=>s+i.share,0))}</strong>
                  </div>
                </div>
              </div>`;
            }).join('')}
      </div>`;
  } catch(e) { expList.innerHTML=`<div class="card"><div class="card-sub">오류: ${e.message}</div></div>`; }
}

window.previewImport = async () => {
  importedCandidates = [];

  const sheetUrl = document.getElementById('import-sheet-url')?.value.trim();

  try {

    }

    if (rows.length > 1 && isNaN(rows[0][0]) && typeof rows[0][0] === 'string' && rows[0][0].length < 5) {

    }

    importedCandidates = rows.filter(r => r[0]).map(r => ({

  }

async function parseFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        resolve(rows);
      } catch(err) { reject(err); }
    };
    reader.onerror = () => reject(new Error('파일 읽기 실패'));
    reader.readAsArrayBuffer(file);
  });
}

async function fetchGoogleSheet(url) {
  // 구글시트 URL → CSV export URL 변환
  const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if (!match) throw new Error('올바른 구글 시트 URL이 아닙니다.');
  const sheetId = match[1];
  const gidMatch = url.match(/gid=(\d+)/);
  const gid = gidMatch ? gidMatch[1] : '0';
  const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;
  const resp = await fetch(csvUrl);
  if (!resp.ok) throw new Error('구글 시트를 가져올 수 없습니다. 공개 공유 설정을 확인해주세요.');
  const text = await resp.text();
  return text.split('\n').map(line => line.split(',').map(cell => cell.replace(/^"|"$/g,'').trim()));
}

      <div style="display:flex;justify-content:space-between;align-items:center">

          <div style="font-weight:700">${esc(u.nick)} <span style="color:var(--sub);font-size:13px">(${esc(u.realname)})</span></div>
          <div class="card-sub">${esc(u.email)}</div>
          ${u.phone?`<div class="card-sub">📱 ${esc(u.phone)}</div>`:''}
          ${u.children?.length?`<div style="margin-top:6px">${u.children.map(c=>`<span class="child-chip">👶 ${esc(c.name)}</span>`).join('')}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <div style="display:flex;gap:4px">
            <span class="badge ${u.role==='mom'?'b-or':'b-bl'}">${u.role==='mom'?'👩 엄마':'👨 아빠'}</span>
            ${u.isAdmin?'<span class="badge b-or">관리자</span>':''}
          </div>
          ${u.id!==currentUser.uid?`
            <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
              <button class="btn btn-sm ${u.isAdmin?'btn-gray':'btn-out'}" onclick="toggleAdmin('${u.id}',${u.isAdmin})">${u.isAdmin?'관리자 해제':'관리자 승격'}</button>
              <button class="btn btn-sm btn-gray" onclick="toggleRole('${u.id}','${u.role||'dad'}')">${u.role==='mom'?'👨 아빠로 변경':'👩 엄마로 변경'}</button>
            </div>
          `:'<span class="badge b-gy">나</span>'}
        </div>
      </div>
    </div>`).join('');
}

window.toggleSettleDetail = (uid) => {
  const el = document.getElementById('settle-detail-'+uid);
  if (el) el.classList.toggle('open');
};

window.toggleAdmin=async(uid,isAdmin)=>{ if(!confirm(isAdmin?'관리자를 해제하시겠습니까?':'관리자로 승격하시겠습니까?')) return; await updateDoc(doc(db,'users',uid),{isAdmin:!isAdmin}); allUsers[uid]={...allUsers[uid],isAdmin:!isAdmin}; renderAdminMembers(); };

window.toggleRole=async(uid,currentRole)=>{
  const newRole = currentRole==='mom'?'dad':'mom';
  const label = newRole==='mom'?'엄마':'아빠';
  if(!confirm(`${label}로 변경하시겠습니까?`)) return;
  await updateDoc(doc(db,'users',uid),{role:newRole});
  allUsers[uid]={...allUsers[uid],role:newRole};
  renderAdminMembers();
};

// ========== MODAL ==========
function openModal(html) { document.getElementById('modal-container').innerHTML=`<div class="modal-overlay" onclick="handleOverlay(event)"><div class="modal-box">${html}</div></div>`; }
window.closeModal=()=>{ document.getElementById('modal-container').innerHTML=''; };
window.handleOverlay=(e)=>{ if(e.target.classList.contains('modal-overlay')) closeModal(); };

// ========== UTILS ==========
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts){ if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'}); }
function fmtDateShort(ts){ if(!ts) return ''; const d=ts.toDate?ts.toDate():new Date(ts); return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`; }
function won(n){ return Number(n).toLocaleString('ko-KR')+'원'; }
function calcAge(bd){ if(!bd) return '?'; const t=new Date(),b=new Date(bd); let a=t.getFullYear()-b.getFullYear(); if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate())) a--; return a; }
</script>
